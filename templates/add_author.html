{% extends "base.html" %}

{% block title %}Add Author - Online Library{% endblock %}

{% block content %}
<section class="page-header">
    <h1 class="main-title">Add author</h1>
    <a href="javascript:history.back()" class="btn btn-secondary">Return</a>
</section>

<form method="POST" class="add-book-form" style="max-width: 600px; margin: 0 auto;">
    <div class="form-section">
        <h3>Author's Basic Information</h3>

        <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" required placeholder="Enter author's name">
        </div>

        <div class="form-group">
            <label for="birth_date">Birth Date</label>
            <input type="date" id="birth_date" name="birth_date">
        </div>

        <div class="form-group">
            <label for="nationality_id">Nationality</label>
            <select id="nationality_id" name="nationality_id" required>
                {% for nationality in nationalities %}
                <option value="{{ nationality.id }}">{{ nationality.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="biography">Biography</label>
            <textarea id="biography" name="biography" rows="5" placeholder="Enter author's biography..."></textarea>
        </div>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> Save
        </button>
        <button type="reset" class="btn btn-secondary">Reset</button>
    </div>
</form>
{% endblock %}

{% extends "base.html" %}

{% block title %}Add Category - Online Library{% endblock %}

{% block content %}
<section class="page-header">
    <h1 class="main-title">Add New Category</h1>
    <a href="javascript:history.back()" class="btn btn-secondary">Return</a>
</section>

<form method="POST" class="add-book-form" style="max-width: 600px; margin: 0 auto;">
    <div class="form-section">
        <h3>Category Information</h3>
        
        <div class="form-group">
            <label for="name">Category Name *</label>
            <input type="text" id="name" name="name" required placeholder="Enter category name, e.g. Mystery, Science Fiction">
        </div>
        
        <div class="form-group">
            <label for="description">Category Description</label>
            <input type="text" id="description" name="description" placeholder="Enter short description of the category">
        </div>
    </div>
    
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> Save Category
        </button>
        <button type="reset" class="btn btn-secondary">Reset</button>
    </div>
</form>
{% endblock %}

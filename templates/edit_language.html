{% extends "base.html" %}

{% block title %}Edit Language{% endblock %}

{% block content %}
<section class="page-header">
    <h1 class="main-title">Edit Language</h1>
    <a href="{{ url_for('list_languages') }}" class="btn btn-secondary">Return</a>
</section>

<form method="POST" class="add-book-form">
    <div class="form-section">
        <h3>Language Information</h3>

        <div class="form-group">
            <label for="name">Language Name *</label>
            <input type="text" id="name" name="name" value="{{ language.name }}" required>
        </div>

        <div class="form-group">
            <label for="description">Language Description *</label>
            <input type="text" id="description" name="description" value="{{ language.description }}" required>
        </div>
    </div>

    {% with cancel_url=url_for('list_languages') %}
    {% include "btn_save_cancel.html" %}
    {% endwith %}

</form>
{% endblock %}

{% extends "base.html" %}

{% block title %}Add book - Smart Library{% endblock %}

{% block content %}
<section class="page-header">
    <h1 class="main-title">Add book</h1>
    <a href="javascript:history.back();" class="btn btn-secondary">Return</a>
    <!-- <a href="{{ url_for('books') }}" class="btn btn-secondary">Return to list</a> -->
</section>

{% if errors %}
<div class="alert alert-danger">
    <ul>
        {% for error in errors %}
        <li>{{ error }}</li>
        {% endfor %}
    </ul>
</div>
{% endif %}

<form method="POST" class="add-book-form">
    <h3>Information</h3>
    <div class="form-grid">
        <div class="form-section">

            <div class="form-group">
                <label for="title">Book title *</label>
                <input type="text" id="title" name="title" required value="For test">
            </div>

            <div class="form-group">
                <label for="author_id">Author *</label>
                <select id="author_id" name="author_id" required>
                    {% for author in authors %}
                    <option value="{{ author.id }}">{{ author.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="publish_year">Publish year</label>
                    <input type="number" id="publish_year" name="publish_year" min="1940" max="2026" value="{{2000}}">
                </div>

                <div class="form-group">
                    <label for="pages">Pages</label>
                    <input type="number" id="pages" name="pages" min="1" value="50">
                </div>
            </div>

            <div class="form-group">
                <label for="price">Price (¥)</label>
                <input type="number" id="price" name="price" step="1" min="0" value="12.00">
            </div>

        </div>
        
        <div class="form-section">
                       
            <div class="form-group">
                <label for="publisher">Publisher</label>
                <input type="text" id="publisher" name="publisher" value="Publisher for test">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="language_id">Language</label>
                    <select id="language_id" name="language_id">
                        {% for language in languages %}
                        <option value="{{ language.id }}">{{ language.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="edition">Edition</label>
                    <input type="text" id="edition" name="edition" value="Volume 1st">
                </div>
            </div>

            <div class="form-group">
                <label for="cover_type_id">Cover type</label>
                <select id="cover_type_id" name="cover_type_id">
                    {% for ctype in cover_types %}
                    <option value="{{ ctype.id }}">{{ ctype.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="category_id">Categories</label>
                <select id="category_id" name="category_id">
                    {% for category in categories %}
                    <option value="{{ category.id }}">{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>

    <div class="form-section">
        <h3>Content description</h3>

        <div class="form-group">
            <textarea id="description" name="description" rows="5" placeholder="Enter content description" value="Description for test"></textarea>
        </div>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> Save book
        </button>
        <button type="reset" class="btn btn-secondary">Reset</button>
    </div>
</form>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<section class="page-header">
    <h1>修改分类信息：{{ category.name }}</h1>
</section>

<form method="POST" class="add-book-form" style="max-width: 600px; margin: 0 auto;">
    <div class="form-section">
        <div class="form-group">
            <label for="name">分类名称 *</label>
            <input type="text" id="name" name="name" value="{{ category.name }}" required>
        </div>
        <div class="form-group">
            <label for="description">分类描述</label>
            <input type="text" id="description" name="description" value="{{ category.description or '' }}">
        </div>
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">保存修改</button>
        <a href="{{ url_for('list_categories') }}" class="btn btn-secondary">取消</a>
    </div>
</form>
{% endblock %}

{% extends "base.html" %}

{% block title %}Edit Category - Online Library{% endblock %}

{% block content %}
<section class="page-header">
    <h1 class="main-title">Edit Category</h1>
    <a href="javascript:history.back()" class="btn btn-secondary">Return</a>
</section>

<form method="POST" class="add-book-form" style="max-width: 600px; margin: 0 auto;">
    <div class="form-section">
        <h3>Category Information</h3>

        <div class="form-group">
            <label for="name">Category Name *</label>
            <input type="text" id="name" name="name" value="{{ category.name }}" required disabled>
        </div>

        <div class="form-group">
            <label for="description">Category Description</label>
            <input type="text" id="description" name="description" value="{{ category.description or '' }}">
        </div>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('list_categories') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}

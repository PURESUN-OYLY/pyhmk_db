{% extends "base.html" %}

{% block title %}Edit Author - Online Library{% endblock %}

{% block content %}
<section class="page-header">
    <h1 class="main-title">Edit Author: {{ author.name }}</h1>
    <a href="javascript:history.back()" class="btn btn-secondary">Return</a>
</section>

<form method="POST" class="add-book-form">
    <div class="form-section">
        <h3>Author's Basic Information</h3>

        <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" value="{{ author.name }}" required>
        </div>
        
        <div class="form-group">
            <label for="birth_date">Birth Date</label>
            <input type="date" id="birth_date" name="birth_date" value="{{ author.birth_date }}">
        </div>

        <div class="form-group">
            <label for="nationality_id">Nationality</label>
            <select id="nationality_id" name="nationality_id" required>
                {% for nationality in nationalities %}
                <option value="{{ nationality.id }}" {% if nationality.id == author.nationality_id %}selected{% endif %}>{{ nationality.name }}</option>
                {% endfor %}
            </select>
        </div>
    
        <div class="form-group">
            <label for="biography">Biography</label>
            <textarea id="biography" name="biography" rows="5">{{ author.biography }}</textarea>
        </div>
    </div>

    {% with cancel_url=url_for('list_authors') %}
    {% include "btn_save_cancel.html" %}
    {% endwith %}

</form>
{% endblock %}

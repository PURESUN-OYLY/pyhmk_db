{% extends "base.html" %}
{% block content %}
<section class="page-header">
    <h1>修改作者信息：{{ author.name }}</h1>
</section>

<form method="POST" class="add-book-form" style="max-width: 600px; margin: 0 auto;">
    <div class="form-section">
        <div class="form-group">
            <label for="name">作者姓名 *</label>
            <input type="text" id="name" name="name" value="{{ author.name }}" required>
        </div>
        <div class="form-group">
            <label for="birth_date">出生日期</label>
            <input type="date" id="birth_date" name="birth_date" value="{{ author.birth_date }}">
        </div>
        <div class="form-group">
            <label for="country">国籍</label>
            <input type="text" id="country" name="country" value="{{ author.country or '' }}">
        </div>
        <div class="form-group">
            <label for="biography">作者简介</label>
            <textarea id="biography" name="biography" rows="5">{{ author.biography }}</textarea>
        </div>
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">保存修改</button>
        <a href="{{ url_for('list_authors') }}" class="btn btn-secondary">取消</a>
    </div>
</form>
{% endblock %}

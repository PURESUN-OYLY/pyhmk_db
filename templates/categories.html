{% extends "base.html" %}

{% block title %}分类管理 - 智慧图书馆{% endblock %}

{% block content %}
<section class="page-header">
    <h1 class="main_title">书籍分类列表</h1>
    <a href="{{ url_for('add_category') }}" class="btn btn-primary"><i class="fas fa-plus"></i> 添加新分类</a>
</section>

<div class="books-container">
    {% if categories %}
    <table class="books-table">
        <thead>
            <tr>
                <th>分类名称</th>
                <th>描述介绍</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            {% for category in categories %}
            <tr>
                <td><span class="category-tag" style="font-size:1rem;">{{ category.name }}</span></td>
                <td>{{ category.description or '无描述' }}</td>
                <td>
                    <a href="{{ url_for('edit_category', category_id=category.id) }}" class="btn btn-small btn-info">修改</a>
                    <a href="{{ url_for('delete_category', category_id=category.id) }}" class="btn btn-small btn-danger">删除</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    <div class="empty-state"><h3>暂无分类数据</h3></div>
    {% endif %}
</div>
{% endblock %}
